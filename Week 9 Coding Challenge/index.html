<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set up a randomizer</title>
</head>
<style>
    /* CSS reset */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body {
        min-height: 100vh;
        padding: 40px;
        display: grid;
        grid-template-columns: 100%;
        justify-content: center;
        align-items: flex-end;
        gap: 40px;
        transition: background-color 0.5s ease-in-out,
            color 0.5s ease-in-out;
    }
    .text {
        text-align: center;
        font-size: 32px;
    }
    img {
        display: block;
        margin: 0 auto;
        width: 220px;
        height: 220px;
        object-fit: cover;
    }
    button {
        background-color: transparent;
        border: none;
        font-family: Helvetica, Arial, sans-serif;
        color: rgb(155, 155, 155);
        font-size: 18px;
        cursor: pointer;
    }
</style>
<body>
    <img id="photo" src="black.jpg" alt="">
    <p class="text">Poem generator</p>
    <button onclick="randomize()">randomize</button>
<script>
    const bodyTag = document.querySelector("body")
    const pTag = document.querySelector("p")
    const photoTag = document.querySelector("img")

    const phrases = [
        "l'appel du vide",
        "shallows",
        "archives",
        "integuments",
        "waves"
    ]
    const colors = [
        "dodgerblue",
        "yellow",
        "olive",
        "crimson",
        "lightgray"
    ]
    const photos = [
        "black.jpg",
        "white.jpg",
        "brown.jpg",
        "black.jpg",
        "white.jpg"
    ]

    let counter = 0

    function randomize() {
        counter = Math.floor(Math.random() * phrases.length)
        bodyTag.style.backgroundColor = colors[counter]
        pTag.innerHTML = phrases[counter]
        photoTag.src = photos[counter]
        console.log(counter)
    }
</script>
</body>
</html>
